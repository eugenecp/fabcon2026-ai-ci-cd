# Continuous Deployment Pipeline for Microsoft Fabric
# Pipeline name: fdt-nyc-taxi-cd
# Implements Git-integrated deployment strategy with:
# - Build version tracking across all environments (date-based: YYYYMMDD.Rev)
# - Unique release branch per deployment (release/{env}/{version})
# - Variable library substitution with actual artifact IDs
# - Approval gates for controlled promotion

# Build number format: YYYYMMDD.r where r auto-increments per day
# Example: 20260314.1, 20260314.2, 20260314.3, ...
name: $(Date:yyyyMMdd)$(Rev:.r)

trigger:
  branches:
    include:
    - main

# Disable PR triggers - this is a deployment pipeline
pr: none

pool:
  vmImage: 'windows-latest'

# Note: buildVersion is calculated dynamically in the Build stage
# Format: YYYYMMDD.Rev or YYYYMMDD.Rev.PRNumber (e.g., 20260314.31 or 20260314.31.7514)

variables:
  # Optional: Shared service principal credentials (if not using per-environment creds)
  - group: Fabric-Shared-Auth
  # Azure service connection for Fabric API authentication
  # Create this in Azure DevOps: Project Settings > Service connections > New service connection > Azure Resource Manager
  # If not set, will use service principal from Fabric-Shared-Auth variable group
  - name: azureSubscription
    value: ''  # Set to your Azure service connection name (e.g., 'Fabric-Deployment')

stages:
#------------------------------------------------------------------
# Stage: Build & Version
#------------------------------------------------------------------
- stage: Build
  displayName: 'Build & Version Artifacts'
  jobs:
  - job: CreateBuildVersion
    displayName: 'Create Build Version'
    steps:
    
    - checkout: self
      persistCredentials: true
      clean: true
    
    - task: PowerShell@2
      displayName: 'Set Build Version'
      inputs:
        targetType: 'inline'
        script: |
          # Generate version using Build.BuildNumber + optional PR number
          # Build.BuildNumber format from pipeline name: YYYYMMDD.r (e.g., 20260314.31)
          # Final format: YYYYMMDD.Rev.PRNumber (e.g., 20260314.31.7514)
          # If no PR (direct commit): YYYYMMDD.Rev (e.g., 20260314.31)
          
          $buildNumber = "$(Build.BuildNumber)"
          
          # Extract PR number from merge commit message
          # Azure DevOps merge commits: "Merged PR 123: Description"
          $commitMessage = git show -s --format=%s "$(Build.SourceVersion)"
          Write-Host "Commit Message: $commitMessage"
          
          $prNumber = $null
          if ($commitMessage -match "Merged PR (\d+):") {
            $prNumber = $matches[1]
            Write-Host "✓ PR Number found: $prNumber"
          } else {
            Write-Host "⚠ No PR number found (direct commit or manual merge)"
          }
          
          # Build version string
          if ($prNumber) {
            $version = "$buildNumber.$prNumber"
          } else {
            $version = "$buildNumber"
          }
          
          Write-Host "##[section]Build Version: $version"
          Write-Host "  Build Number: $buildNumber"
          Write-Host "  PR Number: $(if ($prNumber) { $prNumber } else { 'N/A' })"
          Write-Host "  Source Commit: $(Build.SourceVersion)"
          
          # Update build number in Azure DevOps
          Write-Host "##vso[build.updatebuildnumber]$version"
          
          # Store version for downstream stages
          Write-Host "##vso[task.setvariable variable=buildVersion;isOutput=true]$version"
        pwsh: true
      name: VersionInfo
    
    - task: PowerShell@2
      displayName: 'Tag Commit with Build Version'
      inputs:
        targetType: 'inline'
        script: |
          $version = "$(VersionInfo.buildVersion)"
          $commitId = "$(Build.SourceVersion)"
          
          Write-Host "##[section]Tagging commit with version: v$version"
          Write-Host "  Commit: $commitId"
          
          git config user.email "azuredevops@fabric.deployment"
          git config user.name "Azure DevOps Deployment"
          
          # Create annotated tag
          git tag -a "v$version" -m "Build version $version"
          git push origin "v$version"
          
          Write-Host "✓ Version tag v$version created successfully"
        pwsh: true
      env:
        SYSTEM_ACCESSTOKEN: $(System.AccessToken)
    
    - task: PublishBuildArtifacts@1
      displayName: 'Publish Build Metadata'
      inputs:
        pathToPublish: '$(Build.SourcesDirectory)'
        artifactName: 'fabric-artifacts'

#------------------------------------------------------------------
# Deployment Stages (Using Template)
#------------------------------------------------------------------

# CI Environment - Auto-deploy
- template: templates/deploy-stage.yml
  parameters:
    environmentName: 'CI'
    environmentDisplayName: 'CI'
    azureDevOpsEnvironment: 'Fabric-CI'
    variableGroup: 'Fabric-Workspace-CI'
    deployBranchPrefix: 'release/ci'
    azureSubscription: ${{ variables.azureSubscription }}
    dependsOn: ['Build']
    cleanValueSets: false

# DEV Environment - Requires approval
- template: templates/deploy-stage.yml
  parameters:
    environmentName: 'DEV'
    environmentDisplayName: 'DEV'
    azureDevOpsEnvironment: 'Fabric-DEV'
    variableGroup: 'Fabric-Workspace-DEV'
    deployBranchPrefix: 'release/dev'
    azureSubscription: ${{ variables.azureSubscription }}
    dependsOn: ['Build', 'DeployCI']
    cleanValueSets: true

# QA Environment - Requires approval
- template: templates/deploy-stage.yml
  parameters:
    environmentName: 'QA'
    environmentDisplayName: 'QA'
    azureDevOpsEnvironment: 'Fabric-QA'
    variableGroup: 'Fabric-Workspace-QA'
    deployBranchPrefix: 'release/qa'
    azureSubscription: ${{ variables.azureSubscription }}
    dependsOn: ['Build', 'DeployDEV']
    cleanValueSets: true

# PROD Environment - Requires approval
- template: templates/deploy-stage.yml
  parameters:
    environmentName: 'PROD'
    environmentDisplayName: 'PROD'
    azureDevOpsEnvironment: 'Fabric-PROD'
    variableGroup: 'Fabric-Workspace-PROD'
    deployBranchPrefix: 'release/prod'
    azureSubscription: ${{ variables.azureSubscription }}
    dependsOn: ['Build', 'DeployQA']
    cleanValueSets: true

#------------------------------------------------------------------
# Stage: Post-Deployment Validation
#------------------------------------------------------------------
- stage: PostDeploymentValidation
  displayName: 'Post-Deployment Validation'
  dependsOn: 
    - Build
    - DeployCI
    - DeployDEV
    - DeployQA
    - DeployPROD
  condition: always()  # Run regardless of whether all stages succeeded
  jobs:
  - job: ValidateDeployment
    displayName: 'Validate Deployment'
    steps:
    
    - task: PowerShell@2
      displayName: 'Verify Release Branches'
      inputs:
        targetType: 'inline'
        script: |
          Write-Host "##[section]Verifying release branches for version $(Build.BuildNumber)"
          
          $version = "$(Build.BuildNumber)"
          
          # Check all possible release branches
          $branchesChecked = @{
            "CI" = "release/ci/$version"
            "DEV" = "release/dev/$version"
            "QA" = "release/qa/$version"
            "PROD" = "release/prod/$version"
          }
          
          $foundBranches = @()
          $missingBranches = @()
          
          foreach ($env in $branchesChecked.Keys) {
            $branch = $branchesChecked[$env]
            $exists = git ls-remote --heads origin $branch
            if ($exists) {
              Write-Host "✓ $env deployed: $branch"
              $foundBranches += $env
            } else {
              Write-Host "⊘ $env not deployed: $branch (branch not found)"
              $missingBranches += $env
            }
          }
          
          Write-Host ""
          Write-Host "Deployment Summary:"
          Write-Host "  Deployed: $($foundBranches -join ' → ')"
          if ($missingBranches.Count -gt 0) {
            Write-Host "  Not deployed: $($missingBranches -join ', ')"
          }
          Write-Host ""
          
          if ($foundBranches.Count -gt 0) {
            Write-Host "✓ Verified $($foundBranches.Count) environment(s) deployed successfully"
          } else {
            Write-Host "##vso[task.logissue type=warning]No release branches found"
          }
        pwsh: true
    
    - task: PowerShell@2
      displayName: 'Deployment Summary'
      inputs:
        targetType: 'inline'
        script: |
          $version = "$(Build.BuildNumber)"
          Write-Host "##[section]Deployment Summary"
          Write-Host ""
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          Write-Host "  DEPLOYMENT COMPLETED SUCCESSFULLY"
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          Write-Host ""
          Write-Host "Build Version: $version"
          Write-Host "Build ID: $(Build.BuildId)"
          Write-Host ""
          Write-Host "Deployment Flow:"
          Write-Host "  main → CI (auto)"
          Write-Host "  CI → DEV (approved)"
          Write-Host "  DEV → QA (approved)"
          Write-Host "  QA → PROD (approved)"
          Write-Host ""
          Write-Host "Release Branches Created:"
          Write-Host "  • release/ci/$version"
          Write-Host "  • release/dev/$version"
          Write-Host "  • release/qa/$version"
          Write-Host "  • release/prod/$version"
          Write-Host ""
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        pwsh: true
